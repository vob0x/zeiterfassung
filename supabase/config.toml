# Supabase CLI Configuration
# See: https://supabase.com/docs/guides/cli

[project]
# Get these from your Supabase project settings
project_id = "your_project_id"
region = "us-east-1"

[api]
enabled = true
port = 54321

[db]
port = 54322

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
file_size_limit = 52428800
s3:
  enabled = false

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "http://localhost:5173/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_signups = false

[analytics]
enabled = false
vector_enabled = false

[realtime]
enabled = true
max_bytes_per_second = 1000000
